name: Build uml-veristat

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: uml-veristat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Build package
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check kernel patch style
        run: bash uml-veristat/scripts/check_patch_stack.sh

      - name: Build uml-veristat package
        working-directory: uml-veristat
        env:
          DEBIAN_FRONTEND: noninteractive
          GITHUB_TOKEN: ${{ github.token }}
        run: ./build.sh --package

      - name: Smoke test UML verbose mode
        shell: bash
        run: |
          set -euo pipefail

          LOG="$(mktemp)"
          trap 'rm -f "$LOG"' EXIT

          UML_VERBOSE=1 ./uml-veristat/uml-veristat \
            "$HOME/.local/share/uml-veristat/selftests/verifier_and.bpf.o" \
            2>&1 | tee "$LOG"

          if grep -Eq 'WARNING: arch/um/kernel/um_arch.c|text_poke\+' "$LOG"; then
            echo "Unexpected UML text_poke warning in verbose-mode smoke test"
            exit 1
          fi

      - name: Check expectation-aware regression baseline
        run: python3 uml-veristat/scripts/check_expectations.py

      - name: Show built packages
        run: ls -lh uml-veristat/*.tar.gz

      - name: Upload uml-veristat package
        uses: actions/upload-artifact@v4
        with:
          name: uml-veristat-package-${{ github.sha }}
          path: uml-veristat/*.tar.gz
          if-no-files-found: error
          retention-days: 14
